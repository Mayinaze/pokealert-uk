name: PokeAlert Scraper

on:
  schedule:
    # Run every 24 hours at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Needed to commit updated stock.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd scraper
          pip install -r requirements.txt

      - name: Run scraper
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          python scraper/scraper.py

      - name: Commit updated stock data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "PokeAlert Bot"
          git add frontend/data/stock.json
          git diff --staged --quiet || git commit -m "chore: update stock data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
